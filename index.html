<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gerente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho">
        <h1>Bem-vindo ao Painel de Gerente</h1>
    </header>

    <div class="cartao">
        <h2>📊 Painel de Controle</h2>
        <p>Gerencie suas operações diárias abaixo.</p>

        <button onclick="mostrarQuadroCadastro()">➕ Cadastrar Funcionário</button>
        <button onclick="atualizarListaFuncionarios()">📋 Lista dos Funcionários</button>
        <button onclick="gerarRelatorio()">📊 Visualizar Relatórios</button>
        <button onclick="mostrarQuadroAvaliacoes()">⭐ Avaliações de Desempenho</button>

        <div id="quadro-cadastro" class="escondido">
            <h2>Cadastrar Funcionário</h2>
            <input type="text" id="inputNome" placeholder="Nome do Funcionário">
            <input type="text" id="inputCargo" placeholder="Cargo do Funcionário">
            <input type="number" id="inputSalario" placeholder="Salário do Funcionário">
            <input type="text" id="inputDepartamento" placeholder="Departamento">
            <input type="email" id="inputEmail" placeholder="Email do Funcionário">
            <input type="text" id="inputTelefone" placeholder="Telefone">
            <input type="date" id="inputData" placeholder="Data de Admissão">
            <input type="text" id="inputCep" placeholder="CEP (só números)" style="width: 70%;">
                <button class="btn-buscar" onclick="buscarCepDaInternet()">🔍 Buscar CEP</button>
            <input type="text" id="inputEndereco" placeholder="Endereço Completo">
            <input type="text" id="inputNumero" placeholder="Número Local">
            <br>
            <button class="btn-salvar" onclick="salvarFuncionario()">Cadastrar</button>
            
        </div>

        <div class="escondido" id="quadro-lista">
        </div>

        <div class="escondido" id="quadro-relatorios">
        </div>

        <div class="escondido" id="quadro-avaliacoes">
            <h2>⭐ Avaliações de Desempenho</h2>
            <p>Avalie os funcionários da sua equipe:</p>

            <select id="selectFuncionario">
                <option value="">Selecione um funcionário...</option>
            </select>

            <input type="number" id="inputNota" min="1" max="5" placeholder="Nota (1 a 5)">

            <button class="btn-salvar" onclick="salvarAvaliacao()">Salvar Avaliação</button>

            <h3>Histórico da Equipe</h3>
            <div id="historico-avaliacoes">
            </div>
        </div>
    </div>

    <script src="script.js"></script> 
</body>
</html>
